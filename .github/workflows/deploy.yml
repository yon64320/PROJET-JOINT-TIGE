name: Deploy to VPS

# Déclenche un deploy SSH vers le VPS dès que le workflow CI réussit sur main.
# Chainage propre : si lint / tests / build échouent, pas de déploiement.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy to emis.mydigitalbuilder.cloud
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: SSH + git pull + rebuild + restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /var/www/emis
            echo "=== git pull ==="
            git pull origin main
            echo "=== npm install ==="
            npm install --no-audit --no-fund
            echo "=== build ==="
            NODE_ENV=production npm run build
            echo "=== restart pm2 emis ==="
            pm2 restart emis
            pm2 save
            echo "=== done ==="
