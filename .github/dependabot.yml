version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      next:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      univer:
        patterns:
          - "@univerjs/*"
          - "@univerjs-pro/*"
      supabase:
        patterns:
          - "@supabase/*"
          - "supabase"
      tooling:
        patterns:
          - "eslint*"
          - "prettier"
          - "vitest*"
          - "@vitest/*"
          - "husky"
          - "lint-staged"
          - "typescript"
          - "@types/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "postcss"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
